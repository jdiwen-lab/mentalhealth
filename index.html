<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#10284a">
    <meta name="color-scheme" content="only light">
    <meta name="description" content="用五個職場情境，探索你面對壓力時最常運用的韌力角色。免登入、不收集作答資料，約兩分鐘完成。">
    <meta name="robots" content="index,follow">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_TW">
    <meta property="og:site_name" content="職場韌力角色心理測驗">
    <meta property="og:title" content="你是哪一種職場韌力角色？">
    <meta property="og:description" content="五個情境、約兩分鐘，看看你如何在壓力中找回步調。">
    <meta property="og:url" content="https://jdiwen-lab.github.io/mentalhealth/">
    <meta property="og:image" content="https://jdiwen-lab.github.io/mentalhealth/assets/og-cover.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="五張職場韌力角色圖卡與測驗標題：找到你的職場韌力角色">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="你是哪一種職場韌力角色？">
    <meta name="twitter:description" content="五個情境、約兩分鐘，探索你的職場韌力角色。">
    <meta name="twitter:image" content="https://jdiwen-lab.github.io/mentalhealth/assets/og-cover.png">
    <meta name="twitter:image:alt" content="五張職場韌力角色圖卡與測驗標題：找到你的職場韌力角色">
    <link rel="canonical" href="https://jdiwen-lab.github.io/mentalhealth/">
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="preload" as="image" href="assets/cards/harbor-preview.webp" type="image/webp" fetchpriority="high">
    <link rel="stylesheet" href="styles.css">
    <title>職場韌力角色心理測驗</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳至主要內容</a>

    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="#home" aria-label="返回測驗首頁">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 44 44" role="img">
            <path d="M7 25c5-8 10-8 15 0s10 8 15 0" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M10 31c4-4 8-4 12 0s8 4 12 0" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity=".65"/>
            <circle cx="22" cy="13" r="5" fill="currentColor" opacity=".9"/>
          </svg>
        </span>
        <span>
          <strong>職場韌力</strong>
          <small>角色心理測驗</small>
        </span>
      </a>
      <div class="reading-controls" role="group" aria-label="調整網頁文字大小">
        <span aria-hidden="true">字體</span>
        <button type="button" data-font-size="normal" aria-label="使用標準大字體" aria-pressed="true">標準</button>
        <button type="button" data-font-size="large" aria-label="放大網頁文字" aria-pressed="false">A＋</button>
      </div>
    </header>

    <main id="main-content">
      <section id="home" class="view view-home is-active" data-view="home" aria-labelledby="hero-title">
        <div class="hero-shell">
          <div class="hero-copy">
            <p class="eyebrow"><span class="eyebrow-dot"></span>5 題 · 約 2 分鐘 · 全程本機作答</p>
            <h1 id="hero-title">找到你的<br><span>職場韌力角色</span></h1>
            <p class="hero-lead">從 5 個日常職場情境，找出你此刻較常展現的韌力方式。</p>
            <div class="hero-actions">
              <button id="start-button" class="button button-primary button-large" type="button">
                開始測驗（共 5 題）
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
              </button>
              <button id="resume-button" class="button button-quiet button-large" type="button" hidden>繼續上次進度</button>
            </div>
            <p class="compact-notice">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 5 6v5c0 4.7 2.8 8.3 7 10 4.2-1.7 7-5.3 7-10V6l-7-3Z"/></svg>
              作答只在本機計算、不會上傳；結果僅供自我探索，非心理衡鑑或醫療診斷。
            </p>
          </div>

          <div class="hero-visual" aria-label="職場韌力角色圖卡預覽">
            <div class="hero-card-showcase">
              <div class="showcase-glow" aria-hidden="true"></div>
              <img class="showcase-card showcase-card-left" src="assets/cards/coral-preview.webp" width="640" height="960" alt="" aria-hidden="true">
              <img class="showcase-card showcase-card-center" src="assets/cards/harbor-preview.webp" width="640" height="960" alt="港灣型職場韌力角色圖卡範例" fetchpriority="high">
              <img class="showcase-card showcase-card-right" src="assets/cards/breeze-preview.webp" width="640" height="960" alt="" aria-hidden="true">
              <span class="showcase-seal" aria-hidden="true">EAP<br>韌力卡</span>
            </div>
          </div>
        </div>
      </section>

      <section id="quiz-view" class="view view-quiz" data-view="quiz" aria-labelledby="question-title" hidden>
        <div class="quiz-shell">
          <header class="quiz-progress">
            <div class="progress-copy">
              <p id="progress-label">第 1 題，共 5 題</p>
            </div>
            <div class="progress-track" role="progressbar" aria-labelledby="progress-label" aria-valuemin="1" aria-valuemax="5" aria-valuenow="1">
              <span id="progress-bar"></span>
            </div>
          </header>

          <form id="quiz-form" class="question-card" novalidate>
            <fieldset>
              <legend class="sr-only">請選擇最符合你的答案</legend>
              <h2 id="question-title"></h2>
              <p id="question-hint" class="question-hint">請選最像你平常反應的一項。</p>
              <div id="options-list" class="options-list" role="radiogroup" aria-describedby="question-hint"></div>
            </fieldset>

            <div class="quiz-actions">
              <button id="previous-button" class="button button-quiet" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"/></svg>
                上一題
              </button>
              <button id="next-button" class="button button-primary" type="submit" disabled>
                <span>下一題</span>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
              </button>
            </div>
          </form>
          <div id="quiz-status" class="sr-only" aria-live="polite"></div>
        </div>
      </section>

      <section id="result-view" class="view view-result" data-view="result" aria-labelledby="result-title" hidden>
        <div class="result-intro">
          <h2 id="result-title"><span id="result-role-name"></span></h2>
          <p id="result-tagline" class="result-tagline"></p>
        </div>

        <div class="result-layout">
          <article class="result-detail-card">
            <div id="result-symbol" class="result-symbol" aria-hidden="true"></div>
            <p id="result-summary" class="result-summary"></p>
            <div id="result-keywords" class="keyword-list" aria-label="角色關鍵字"></div>

            <div class="result-sections">
              <section>
                <div><h3>你帶來的力量</h3><p id="result-strength"></p></div>
              </section>
              <section>
                <div><h3>給自己的提醒</h3><p id="result-reminder"></p></div>
              </section>
              <section>
                <div><h3>今天就能做的小練習</h3><p id="result-practice"></p></div>
              </section>
            </div>
          </article>

          <aside class="share-panel" aria-label="結果圖卡與分享">
            <picture class="result-card-picture">
              <source id="result-card-source" type="image/webp">
              <img id="result-card-image" width="640" height="960" alt="你的職場韌力角色圖卡" decoding="async">
            </picture>
            <div class="share-actions">
              <button id="share-button" class="button button-primary" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0-12-4 4m4-4 4 4M5 12v7h14v-7"/></svg>
                分享圖卡
              </button>
              <button id="download-button" class="button button-secondary" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0-4-4m4 4 4-4M5 19h14"/></svg>
                下載 PNG
              </button>
              <button id="copy-button" class="button button-quiet" type="button">複製測驗連結</button>
            </div>
          </aside>
        </div>

        <div class="result-footer-actions">
          <button id="retake-button" class="button button-quiet" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7"/></svg>
            重新測驗
          </button>
        </div>
        <details id="other-roles" class="other-roles">
          <summary>認識其他角色 <span aria-hidden="true">＋</span></summary>
          <div class="other-roles-content">
            <h3>其他四種韌力角色</h3>
            <div id="role-cards" class="role-cards"></div>
          </div>
        </details>

        <p class="compact-notice result-notice">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 5 6v5c0 4.7 2.8 8.3 7 10 4.2-1.7 7-5.3 7-10V6l-7-3Z"/></svg>
          作答只在本機計算、不會上傳；結果僅供自我探索，非心理衡鑑或醫療診斷。
        </p>
      </section>
    </main>

    <dialog id="restart-dialog" class="confirm-dialog" aria-labelledby="restart-title">
      <form method="dialog">
        <div class="dialog-icon" aria-hidden="true">↻</div>
        <h2 id="restart-title">重新開始測驗？</h2>
        <p>目前的作答與結果會從這台裝置清除。</p>
        <div class="dialog-actions">
          <button class="button button-quiet" value="cancel">先不要</button>
          <button id="restart-confirm" class="button button-primary" value="confirm">重新開始</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <noscript><div class="noscript">這份測驗需要 JavaScript 才能進行。請啟用 JavaScript 後重新整理頁面。</div></noscript>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
