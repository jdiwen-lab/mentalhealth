<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">你是哪一種職場韌力角色？</title>
  <desc id="desc">深藍與金色圖卡風格的職場韌力角色心理測驗社群分享封面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071d38"/>
      <stop offset="0.58" stop-color="#12355f"/>
      <stop offset="1" stop-color="#081c35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f3d28d" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#f3d28d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5dea9"/>
      <stop offset="0.48" stop-color="#bd8741"/>
      <stop offset="1" stop-color="#f0ce84"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="190%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000b17" flood-opacity="0.58"/>
    </filter>
    <clipPath id="card-clip">
      <rect width="230" height="345" rx="14"/>
    </clipPath>
    <style>
      @import url("fonts/fonts.css");
      .serif { font-family: "Noto Serif TC Variable", "Noto Serif TC", serif; }
      .sans { font-family: "Noto Sans TC Variable", "Noto Sans TC", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="988" cy="305" r="292" fill="url(#glow)"/>
  <g fill="#f5dfa7" opacity="0.72">
    <circle cx="104" cy="92" r="3"/><circle cx="182" cy="62" r="2"/><circle cx="714" cy="82" r="3"/>
    <circle cx="1095" cy="104" r="2"/><circle cx="1142" cy="510" r="3"/><circle cx="676" cy="548" r="2"/>
  </g>

  <rect x="23" y="23" width="1154" height="584" rx="34" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <rect x="37" y="37" width="1126" height="556" rx="25" fill="none" stroke="#f1d79d" stroke-opacity="0.6" stroke-width="1.5"/>
  <path d="M55 101V66h35M1145 101V66h-35M55 529v35h35M1145 529v35h-35" fill="none" stroke="#edce8d" stroke-width="5" stroke-linecap="round"/>

