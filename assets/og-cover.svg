    <path d="M15 34c7-10 14-10 21 0s14 10 21 0M19 43c6-5 11-5 17 0s11 5 17 0" fill="none" stroke="#071d38" stroke-width="4.8" stroke-linecap="round"/>
    <circle cx="31" cy="20" r="5.5" fill="#071d38"/>
    <text class="sans" x="77" y="24" font-size="22" font-weight="800" fill="#fff8e8" letter-spacing="4">職場韌力</text>
    <text class="sans" x="77" y="51" font-size="15" font-weight="600" fill="#e7ce9f" letter-spacing="5">角色心理測驗</text>
  </g>

  <g transform="translate(82 185)">
    <text class="sans" x="0" y="0" font-size="22" font-weight="800" fill="#e8c982" letter-spacing="3">5 題 · 約 2 分鐘 · 全程本機作答</text>
    <text class="serif" x="0" y="87" font-size="66" font-weight="900" fill="#fff9ec">找到你的</text>
    <text class="serif" x="0" y="174" font-size="76" font-weight="900" fill="#f3d28d">職場韌力角色</text>
    <path d="M0 202h485" stroke="url(#gold)" stroke-width="3"/>
    <text class="sans" x="0" y="249" font-size="23" font-weight="600" fill="#f8ead0">從五個職場情境，看看你面對壓力時</text>
    <text class="sans" x="0" y="286" font-size="23" font-weight="600" fill="#f8ead0">最常運用哪一種力量找回步調。</text>
  </g>

  <g filter="url(#shadow)">
