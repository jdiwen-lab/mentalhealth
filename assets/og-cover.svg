    <text class="serif" x="0" y="-5" text-anchor="middle" font-size="16" font-weight="800" fill="#f3d28d">EAP</text>
    <text class="sans" x="0" y="21" text-anchor="middle" font-size="13" font-weight="800" fill="#fff8e8" letter-spacing="2">韌力卡</text>
