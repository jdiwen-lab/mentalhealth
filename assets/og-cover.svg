      <rect width="230" height="345" rx="16" fill="#fff2d4" stroke="#edc77f" stroke-width="4"/>
      <image xlink:href="cards/coral-preview.webp" width="230" height="345" preserveAspectRatio="xMidYMid slice" clip-path="url(#card-clip)"/>
    </g>
    <g transform="translate(936 151) rotate(9 115 172.5)" opacity="0.92">
      <rect width="230" height="345" rx="16" fill="#fff2d4" stroke="#edc77f" stroke-width="4"/>
      <image xlink:href="cards/breeze-preview.webp" width="230" height="345" preserveAspectRatio="xMidYMid slice" clip-path="url(#card-clip)"/>
    </g>
    <g transform="translate(843 116)">
